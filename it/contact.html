<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contatti — EggTimer Max</title>
  <link rel="icon" href="../icon.png">
  <link rel="stylesheet" href="../styles.css">
  <link rel="alternate" hreflang="en" href="https://eggtimermax.github.io/contact.html">
  <link rel="alternate" hreflang="nl" href="https://eggtimermax.github.io/nl/contact.html">
  <link rel="alternate" hreflang="de" href="https://eggtimermax.github.io/de/contact.html">
  <link rel="alternate" hreflang="es" href="https://eggtimermax.github.io/es/contact.html">
  <link rel="alternate" hreflang="fr" href="https://eggtimermax.github.io/fr/contact.html">
  <link rel="alternate" hreflang="it" href="https://eggtimermax.github.io/it/contact.html">
  <link rel="alternate" hreflang="ja" href="https://eggtimermax.github.io/ja/contact.html">
  <link rel="alternate" hreflang="x-default" href="https://eggtimermax.github.io/contact.html">
  <script>
    // Route to the visitor's language before paint (no flash). Respects a manual
    // choice stored in localStorage; otherwise uses the browser language once.
    (function(){
      var SUP=["en","nl","de","es","fr","it","ja"], page="contact", lang="it";
      function u(l){var f=page+'.html';return l==='en'?'/'+f:'/'+l+'/'+f;}
      try{
        var stored=localStorage.getItem('preferredLang'), target=stored;
        if(!target){
          var n=navigator.languages||[navigator.language||'en'];
          for(var i=0;i<n.length;i++){var c=n[i].slice(0,2).toLowerCase();if(SUP.indexOf(c)>=0){target=c;break;}}
        }
        if(!target)target='en';
        if(target!==lang&&!sessionStorage.getItem('autoRouted')){
          sessionStorage.setItem('autoRouted','1');
          location.replace(u(target));
        }
      }catch(e){}
    })();
  </script>
</head>
<body>
<div class="bubbles" id="bubbles"></div>

<nav class="bar">
  <div class="inner">
    <a class="brand" href="index.html">
      <img src="../icon.png" alt="EggTimer Max">
      <b>EggTimer <span>Max</span></b>
    </a>
    <div class="links">
      <a href="guide.html">Guida</a>
      <a href="support.html">Assistenza</a>
      <a href="privacy.html">Privacy</a>
      <a href="contact.html">Contatti</a>
      <div class="langpick">
        <select aria-label="Language" onchange="try{localStorage.setItem('preferredLang',this.value)}catch(e){};location.href=this.options[this.selectedIndex].dataset.url"><option value="en" data-url="/contact.html">English</option><option value="nl" data-url="/nl/contact.html">Nederlands</option><option value="de" data-url="/de/contact.html">Deutsch</option><option value="es" data-url="/es/contact.html">Español</option><option value="fr" data-url="/fr/contact.html">Français</option><option value="it" data-url="/it/contact.html" selected>Italiano</option><option value="ja" data-url="/ja/contact.html">日本語</option></select>
      </div>
    </div>
  </div>
</nav>

<main class="page wrap">
  <article class="panel reveal">
    <h1>Contatti</h1>
    <p class="meta">Leggiamo ogni messaggio e rispondiamo il prima possibile.</p>

    <form class="form" id="contactForm" novalidate>
      <input type="checkbox" name="botcheck" style="display:none !important" tabindex="-1" autocomplete="off">

      <div>
        <label for="name">Il tuo nome</label>
        <input type="text" id="name" name="name" placeholder="Mario Rossi" required autocomplete="name">
      </div>
      <div>
        <label for="email">La tua e-mail</label>
        <input type="email" id="email" name="email" placeholder="tu@esempio.com" required autocomplete="email">
      </div>
      <div>
        <label for="subject">Oggetto</label>
        <input type="text" id="subject" name="subject" placeholder="Di cosa si tratta?" required>
      </div>
      <div>
        <label for="message">Messaggio</label>
        <textarea id="message" name="message" placeholder="Raccontaci di più…" required></textarea>
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn">Invia messaggio</button>
    </form>

    <div class="success-msg" id="thankYou">
      <div class="check">✓</div>
      <h2>Messaggio inviato!</h2>
      <p>Grazie per averci scritto. Ti risponderemo il prima possibile.</p>
      <a href="index.html" class="btn btn-ghost">Torna alla home</a>
    </div>
  </article>
</main>

<footer class="site wrap">
  <div class="flinks">
    <a href="guide.html">Guida</a>
    <a href="support.html">Assistenza</a>
    <a href="privacy.html">Informativa sulla privacy</a>
    <a href="contact.html">Contatti</a>
  </div>
  <div>&copy; 2026 EggTimer Max</div>
</footer>

<script src="../bubbles.js"></script>
<script src="../main.js"></script>
<script>
  document.getElementById('contactForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    if (this.botcheck && this.botcheck.checked) return;
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = "Invio…";
    const payload = {
      access_key:  '6161d962-9e6c-4838-8408-2c210109eede',
      from_name:   'EggTimer Max',
      name:        this.name.value,
      email:       this.email.value,
      subject:     '[EggTimer Max] ' + this.subject.value,
      message:     this.message.value,
    };
    try {
      const res  = await fetch('https://api.web3forms.com/submit', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body:    JSON.stringify(payload),
      });
      const data = await res.json();
      if (data.success) {
        document.getElementById('contactForm').style.display = 'none';
        document.getElementById('thankYou').style.display = 'block';
      } else {
        throw new Error(data.message || 'Submission failed');
      }
    } catch (err) {
      btn.disabled = false;
      btn.textContent = "Invia messaggio";
      alert("Qualcosa è andato storto — riprova.");
    }
  });
</script>
</body>
</html>
