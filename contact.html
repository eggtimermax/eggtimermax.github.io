<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — EggTimer Max</title>
  <link rel="icon" href="icon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="bubbles" id="bubbles"></div>

<nav class="bar">
  <div class="inner">
    <a class="brand" href="index.html">
      <img src="icon.png" alt="EggTimer Max">
      <b>EggTimer <span>Max</span></b>
    </a>
    <div class="links">
      <a href="guide.html">Guide</a>
      <a href="support.html">Support</a>
      <a href="privacy.html">Privacy</a>
      <a href="contact.html">Contact</a>
    </div>
  </div>
</nav>

<main class="page wrap">
  <article class="panel reveal">
    <h1>Contact</h1>
    <p class="meta">We read every message and get back to you as soon as possible.</p>

    <form class="form" id="contactForm" novalidate>
      <!-- honeypot — hidden from real users, blocks bots -->
      <input type="checkbox" name="botcheck" style="display:none !important" tabindex="-1" autocomplete="off">

      <div>
        <label for="name">Your name</label>
        <input type="text" id="name" name="name" placeholder="Jane Doe" required autocomplete="name">
      </div>
      <div>
        <label for="email">Your email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div>
        <label for="subject">Subject</label>
        <input type="text" id="subject" name="subject" placeholder="What's it about?" required>
      </div>
      <div>
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Tell us more…" required></textarea>
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn">Send message</button>
    </form>

    <div class="success-msg" id="thankYou">
      <div class="check">✓</div>
      <h2>Message sent!</h2>
      <p>Thanks for reaching out. We'll get back to you as soon as possible.</p>
      <a href="index.html" class="btn btn-ghost">Back to home</a>
    </div>
  </article>
</main>

<footer class="site wrap">
  <div class="flinks">
    <a href="guide.html">Guide</a>
    <a href="support.html">Support</a>
    <a href="privacy.html">Privacy Policy</a>
    <a href="contact.html">Contact</a>
  </div>
  <div>&copy; 2026 EggTimer Max</div>
</footer>

<script src="bubbles.js"></script>
<script src="main.js"></script>
<script>
  document.getElementById('contactForm').addEventListener('submit', async function (e) {
    e.preventDefault();

    // block bots
    if (this.botcheck && this.botcheck.checked) return;

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Sending…';

    const payload = {
      access_key:  '6161d962-9e6c-4838-8408-2c210109eede',
      from_name:   'EggTimer Max',
      name:        this.name.value,
      email:       this.email.value,
      subject:     '[EggTimer Max] ' + this.subject.value,
      message:     this.message.value,
    };

    try {
      const res  = await fetch('https://api.web3forms.com/submit', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body:    JSON.stringify(payload),
      });
      const data = await res.json();

      if (data.success) {
        document.getElementById('contactForm').style.display = 'none';
        const ty = document.getElementById('thankYou');
        ty.style.display = 'block';
      } else {
        throw new Error(data.message || 'Submission failed');
      }
    } catch (err) {
      btn.disabled = false;
      btn.textContent = 'Send message';
      alert('Something went wrong — please try again.');
    }
  });
</script>
</body>
</html>
