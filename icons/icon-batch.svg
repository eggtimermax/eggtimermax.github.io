  <!-- three overlapping egg shapes suggesting a batch queue -->
  <ellipse cx="20" cy="36" rx="11" ry="15" fill="rgba(255,255,255,0.45)" stroke="#3D2006" stroke-width="2.8" transform="rotate(-14 20 36)"/>
  <ellipse cx="32" cy="31" rx="11" ry="15" fill="rgba(255,255,255,0.70)" stroke="#3D2006" stroke-width="2.8"/>
  <ellipse cx="44" cy="36" rx="11" ry="15" fill="rgba(245,155,35,0.22)" stroke="#3D2006" stroke-width="2.8" transform="rotate(14 44 36)"/>
  <!-- yolk in center egg -->
  <circle cx="32" cy="32" r="5.5" fill="#F59B23"/>
</svg>
